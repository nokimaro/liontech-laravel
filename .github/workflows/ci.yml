name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, json, openssl
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check code style
        run: composer ecs

      - name: Run static analysis
        run: composer phpstan

      - name: Run type coverage check
        run: composer test-type-coverage

  tests:
    name: Tests — PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
        laravel: ["11.*", "12.*", "13.*"]

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, openssl
          coverage: none

      - name: Install dependencies
        run: composer require illuminate/support:${{ matrix.laravel }} --no-interaction --no-progress

      - name: Run tests
        run: composer test
